<!-- {{$ctrl.currentEmployee | json}} -->
<div layout="column" ng-cloak class="md-inline-form">
    <md-content md-theme="docs-dark" layout-gt-sm="column" layout-padding>
        <div class="employee-form">
            <div class="gender-button">
                <label>Gender</label>
                <md-radio-group ng-model="$ctrl.currentEmployee.gender">
                    <md-radio-button value="female">Female</md-radio-button>
                    <md-radio-button value="male">Male</md-radio-button>
                </md-radio-group>
            </div>

            <md-input-container class="md-block">
                <label>First Name</label>
                <input ng-model=$ctrl.currentEmployee.firstName>
            </md-input-container>

            <md-input-container class="md-block">
                <label>Last Name</label>
                <input ng-model=$ctrl.currentEmployee.lastName>
            </md-input-container>

            <md-input-container class="md-block">
                <label>Designation</label>
                <input ng-model=$ctrl.currentEmployee.designation>
            </md-input-container>

            <md-input-container class="md-block">
                <label>City</label>
                <input ng-model=$ctrl.currentEmployee.city>
            </md-input-container>

            <md-input-container class="md-block">
                <label>Salary</label>
                <input ng-model=$ctrl.currentEmployee.salary>
            </md-input-container>

            <md-input-container class="md-block">
                <label>Department</label>
                <md-select ng-model=$ctrl.currentEmployee.department>
                    <md-option value={{department.value}} ng-repeat="department in $ctrl.allDepartment">
                        {{department.label}}
                    </md-option>
                </md-select>
            </md-input-container>

        </div>
    </md-content>

</div>
<md-content>
    <!-- <md-content md-theme="docs-dark" layout-gt-sm="row" layout-padding> -->
    <section layout="row" layout-sm="column">
        <md-button class="md-raised md-primary w-100" ng-click="$ctrl.save()">
            SUBMIT
        </md-button>
        <md-button class="md-raised w-100" ng-click="$ctrl.clear()">
            CLEAR
        </md-button>
    </section>
</md-content>
