<!-- JSON - 
{{$ctrl.employeeService.allEmployee | json}} -->

<table class="table">
    <thead>
        <tr>
            <th>Gender</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Designation</th>
            <th>City</th>
            <th>Salary</th>
            <th>Department</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
        <tr ng-repeat="employee in $ctrl.employeeService.allEmployee">
            <td>{{employee.gender}}</td>
            <td>{{employee.firstName}}</td>
            <td>{{employee.lastName}}</td>
            <td>{{employee.designation}}</td>
            <td>{{employee.city}}</td>
            <td>{{employee.salary}}</td>
            <td>{{employee.department}}</td>
            <td>
                <a class="btn btn-primary" ng-click="$ctrl.editEmployee(employee)">
                    <i class="bi bi-pen-fill"></i>
                </a>
                <a class="btn btn-danger" ng-click="$ctrl.deleteEmployeeById(employee.id)">
                    <i class="bi bi-archive-fill"></i>
                </a>
                <i class="bi bi-eye-fill"></i>
            </td>
        </tr>
    </tbody>
</table>
