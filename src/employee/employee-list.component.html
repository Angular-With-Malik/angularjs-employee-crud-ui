<table class="table">
    <thead>
        <tr>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Designation</th>
            <th>City</th>
            <th>Salary</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
        <tr ng-repeat="employee in $ctrl.allEmployee">
            <td>{{employee.firstName}}</td>
            <td>{{employee.lastName}}</td>
            <td>{{employee.designation}}</td>
            <td>{{employee.city}}</td>
            <td>{{employee.salary}}</td>
            <td>
                <i class="bi bi-pen-fill"></i>
                <i class="bi bi-archive-fill"></i>
                <i class="bi bi-eye-fill"></i>
            </td>
        </tr>
    </tbody>
</table>
